<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="assets/css/estilo.css">

    <script src="assets/css/js/login.js"></script>

    <script src="https://kit.fontawesome.com/01aa825c71.js" crossorigin="anonymous"></script>
</head>

<body>

<header>
    <div class="logo">W</div>
    <h1 class="titulo">Login</h1>
    <div class="menu-hamburguer">
        <i class="fa-solid fa-bars"></i>
    </div>
</header>

<section class="container" style="justify-content: center; align-items: center;">

    <div class="cartao" style="width: 20rem;">

        <div class="corpo-do-cartao">

            <h2 class="titulo-do-cartao">Entrar</h2>

            <input id="email" type="text" placeholder="E-mail"
                style="padding: .5rem; margin-bottom: .5rem; border-radius: .3rem; border: 1px solid #ccc;">

            <input id="senha" type="password" placeholder="Senha"
                style="padding: .5rem; margin-bottom: .5rem; border-radius: .3rem; border: 1px solid #ccc;">

            <button class="botao-do-cartao" onclick="verificarCredenciais()">
                Entrar
            </button>

        </div>

    </div>

</section>

<footer>
    &copy; Meu Site de Notícias
</footer>


</body>
</html>
